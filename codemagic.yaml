workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      java: 17
      groups:
        - android-signing
    scripts:
      - name: Build Android APK
        script: |
          # 1. توليد ملف keystore افتراضي لحل مشكلة التوقيع
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          
          # 2. تحميل إصدار Gradle المطلوب
          wget https://services.gradle.org/distributions/gradle-9.3.1-bin.zip -P /tmp
          unzip -d /tmp/gradle /tmp/gradle-9.3.1-bin.zip
          export PATH=/tmp/gradle/gradle-9.3.1/bin:$PATH
          
          # 3. بناء التطبيق
          cd app
          gradle assembleDebug
    artifacts:
      - "**/build/outputs/apk/debug/*.apk"
