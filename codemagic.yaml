workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      java: 17
      groups:
        - android-signing
    scripts:
      - name: Build Android APK
        script: |
          wget https://services.gradle.org/distributions/gradle-9.3.1-bin.zip -P /tmp
          unzip -d /tmp/gradle /tmp/gradle-9.3.1-bin.zip
          export PATH=/tmp/gradle/gradle-9.3.1/bin:$PATH
          cd app
          gradle assembleDebug
    artifacts:
      - "**/build/outputs/apk/debug/*.apk"
