workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      java: 17
      groups:
        - android-signing
    scripts:
      - name: Build Android APK
        script: |
          # 1. تحميل إصدار Gradle 9.3.1 المطلوبة وفك ضغطها
          wget https://services.gradle.org/distributions/gradle-9.3.1-bin.zip -P /tmp
          unzip -d /tmp/gradle /tmp/gradle-9.3.1-bin.zip
          
          # 2. تحديث مسار النظام ليعتمد على النسخة الجديدة فوراً
          export PATH=/tmp/gradle/gradle-9.3.1/bin:$PATH
          
          # 3. الدخول للمجلد وبدء البناء بالنسخة الحديثة
          cd app
          gradle assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/*.apk
