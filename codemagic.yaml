workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - android-signing
    scripts:
      - name: Build Android APK
        script: |
          chmod +x gradlew || true
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/*.apk
